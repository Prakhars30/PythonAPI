<!DOCTYPE html>
<html>

<head>
    <title>API Test</title>
</head>

<body>

    <h2>Send Data to Python API</h2>

    <input id="textInput" placeholder="Enter message">
    <button onclick="sendData()">Send</button>

    <h3>Stored Data</h3>
    <button onclick="loadData()">Load Data</button>

    <ul id="dataList"></ul>

    <script>

        const API_URL = "https://unornate-nobuko-unwinking.ngrok-free.dev";

        function sendData() {
            const text = document.getElementById("textInput").value;

            fetch(API_URL + "/send", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ message: text })
            })
                
                .then(res => res.json());
        }

        function loadData() {
            console.log("Attempting to load data...");

            fetch(API_URL + "/data", {
                method: "GET",
                headers: {
                    "Content-Type": "application/json",
                    "ngrok-skip-browser-warning": "true" // Bypasses ngrok's landing page
                }
            })
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    return response.json();
                })
                .then(data => {
                    const list = document.getElementById("dataList");
                    list.innerHTML = "";

                    // Check if data is actually an array
                    if (Array.isArray(data)) {
                        data.forEach(item => {
                            const li = document.createElement("li");
                            li.innerText = item.message || JSON.stringify(item);
                            list.appendChild(li);
                        });
                    } else {
                        console.error("Data received is not an array:", data);
                    }
                })
                .catch(error => {
                    console.error("Fetch Error:", error);
                    alert("Failed to load data. Check console for details.");
                });
        }
    </script>

</body>

</html>
